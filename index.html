<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misc Slides Pages</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Helvetica, Arial, sans-serif;
            background: #f7f7f8;
            color: #1f1f1f;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
        }

        .card {
            margin-top: 2rem;
            background: white;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        ul {
            padding-left: 1.2rem;
        }

        li {
            margin: 0.7rem 0;
        }

        a {
            color: #0b57d0;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.95rem;
            color: #666;
        }

        code {
            background: #f1f3f5;
            padding: 0.15rem 0.35rem;
            border-radius: 6px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>
            This GitHub Pages site hosts miscellaneous HTML content used for
            slide presentations and interactive demos.
        </p>

        <div class="card">
            <h2>Contents</h2>
            <p>
                Add links here to the pages you want to use in your
                presentations.
            </p>

            <ul>
                <li><a href="molecules/">Molecule pages</a></li>
                <li><a href="molecules/example.html">Example molecule</a></li>
            </ul>
        </div>

        <p class="footer">
            Edit <code>index.html</code> to update this page as you add more
            content.
        </p>
    </div>
</body>
</html>
